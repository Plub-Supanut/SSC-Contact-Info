<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผู้ประสานงาน Elective ทุกสถาบัน</title>
<style>
:root {
  --bg: #FAFAF7;
  --card: #FFFFFF;
  --border: #E8E5DE;
  --text: #2C2A25;
  --text2: #6B6760;
  --accent: #2D6A4F;
  --accent-light: #D8F3DC;
  --tag-housing: #FFF3CD;
  --tag-housing-text: #856404;
  --tag-no-housing: #F8D7DA;
  --tag-no-housing-text: #842029;
  --tag-dept: #E8E5DE;
  --tag-dept-text: #4A4740;
  --highlight: #FFF9C4;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding-bottom: 64px;
}

.header {
  background: var(--accent);
  color: white;
  padding: 32px 24px 28px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}

.header p {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 16px;
}

.search-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 200px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  background: rgba(255,255,255,0.95);
  color: var(--text);
  outline: none;
}

.search-box::placeholder { color: #999; }

.filter-btn {
  padding: 8px 16px;
  border: 1.5px solid rgba(255,255,255,0.4);
  border-radius: 8px;
  background: transparent;
  color: white;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn:hover, .filter-btn.active {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.7);
}

.stats {
  padding: 12px 24px;
  font-size: 13px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  background: var(--card);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.stats strong { color: var(--text); }

.container { max-width: 960px; margin: 0 auto; padding: 16px; }

.institution {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}

.institution:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

.inst-header {
  padding: 16px 20px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  user-select: none;
}

.inst-code {
  background: var(--accent);
  color: white;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}

.inst-info { flex: 1; min-width: 0; }

.inst-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.inst-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.housing-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.housing-yes { background: var(--accent-light); color: var(--accent); }
.housing-no { background: var(--tag-no-housing); color: var(--tag-no-housing-text); }
.housing-paid { background: var(--tag-housing); color: var(--tag-housing-text); }

.chevron {
  font-size: 18px;
  color: var(--text2);
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-top: 4px;
}

.institution.open .chevron { transform: rotate(180deg); }

.inst-body {
  display: none;
  border-top: 1px solid var(--border);
}

.institution.open .inst-body { display: block; }

.contact-section {
  padding: 12px 20px;
  border-bottom: 1px solid #f0ede6;
}

.contact-section:last-child { border-bottom: none; }

.section-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--accent);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.contact-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
  padding: 6px 0;
  font-size: 14px;
  align-items: baseline;
}

.contact-row + .contact-row { border-top: 1px solid #f7f5f0; }

.contact-name {
  font-weight: 600;
  color: var(--text);
  min-width: 120px;
}

.contact-phone {
  color: var(--accent);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.contact-email {
  color: var(--text2);
  font-size: 13px;
  word-break: break-all;
}

.contact-note {
  width: 100%;
  font-size: 12px;
  color: var(--text2);
  background: #f9f8f5;
  padding: 6px 10px;
  border-radius: 6px;
  margin-top: 4px;
  line-height: 1.4;
}

.dept-tag {
  display: inline-block;
  background: var(--tag-dept);
  color: var(--tag-dept-text);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}

.housing-info {
  background: #f9f8f5;
  padding: 12px 20px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}

.housing-info strong { color: var(--text); }

.no-results {
  text-align: center;
  padding: 48px 24px;
  color: var(--text2);
  font-size: 15px;
}

.highlight-match { background: var(--highlight); border-radius: 2px; }

.expand-all {
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  background: none;
  border: none;
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 2px;
}

@media (max-width: 600px) {
  .header { padding: 20px 16px 20px; }
  .header h1 { font-size: 17px; }
  .container { padding: 12px; }
  .inst-header { padding: 14px 16px; }
  .contact-section { padding: 10px 16px; }
  .contact-name { min-width: 100%; }
}

@media print {
  .header { position: static; background: white; color: black; }
  .header h1 { color: black; }
  .search-row, .filter-btn, .stats, .chevron { display: none !important; }
  .institution { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ccc; }
  .inst-body { display: block !important; }
  .institution.open .inst-body { display: block; }
  body { padding: 0; }
}
</style>

let currentFilter = 'all';
let searchTerm = '';

function normalize(s) {
  return (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

function matchesSearch(inst, term) {
  if (!term) return true;
  const hay = normalize([
    inst.code, inst.name, inst.housingNote,
    inst.note || '',
    ...inst.contacts.map(c => [c.dept, c.name, c.phone, c.email, c.note || ''].join(' '))
  ].join(' '));
  const terms = normalize(term).split(' ');
  return terms.every(t => hay.includes(t));
}

function matchesFilter(inst, filter) {
  if (filter === 'all') return true;
  if (filter === 'housing') return inst.housing === 'yes' || inst.housing === 'paid';
  if (filter === 'no-housing') return inst.housing === 'no';
  if (filter === 'university') return inst.type === 'university';
  if (filter === 'hospital') return inst.type === 'hospital';
  return true;
}

function housingBadge(h) {
  if (h === 'yes') return '<span class="housing-tag housing-yes">มีที่พักฟรี</span>';
  if (h === 'paid') return '<span class="housing-tag housing-paid">มีที่พัก (มีค่าใช้จ่าย)</span>';
  if (h === 'no') return '<span class="housing-tag housing-no">ไม่มีที่พัก</span>';
  return '';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const list = document.getElementById('list');
  const filtered = DATA.filter(i => matchesSearch(i, searchTerm) && matchesFilter(i, currentFilter));

  document.getElementById('stats').innerHTML =
    `<span>แสดง <strong>${filtered.length}</strong> จาก <strong>${DATA.length}</strong> สถาบัน</span>
     <button class="expand-all" onclick="toggleAll()">${document.querySelector('.institution.open') ? 'ยุบทั้งหมด' : 'ขยายทั้งหมด'}</button>`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">ไม่พบผลลัพธ์ — ลองค้นหาด้วยคำอื่น</div>';
    return;
  }

  list.innerHTML = filtered.map((inst, idx) => {
    const contacts = inst.contacts.map(c => `
      <div class="contact-row">
        <span class="dept-tag">${esc(c.dept)}</span>
        ${c.name ? `<span class="contact-name">${esc(c.name)}</span>` : ''}
        ${c.phone ? `<span class="contact-phone">${esc(c.phone)}</span>` : ''}
        ${c.email ? `<span class="contact-email">${esc(c.email)}</span>` : ''}
        ${c.note ? `<div class="contact-note">${esc(c.note)}</div>` : ''}
      </div>
    `).join('');

    return `
      <div class="institution" data-idx="${idx}">
        <div class="inst-header" onclick="toggle(this)">
          ${inst.code ? `<span class="inst-code">${esc(inst.code)}</span>` : ''}
          <div class="inst-info">
            <div class="inst-name">${esc(inst.name)}</div>
            <div class="inst-meta">
              ${housingBadge(inst.housing)}
              <span class="housing-tag" style="background:#f0ede6;color:#6B6760">${inst.contacts.length} ผู้ประสานงาน</span>
            </div>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="inst-body">
          <div class="contact-section">
            <div class="section-label">ผู้ประสานงาน</div>
            ${contacts}
          </div>
          ${inst.housingNote ? `<div class="housing-info"><strong>ที่พัก:</strong> ${esc(inst.housingNote)}</div>` : ''}
          ${inst.note ? `<div class="housing-info"><strong>หมายเหตุ:</strong> ${esc(inst.note)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function toggle(el) {
  el.closest('.institution').classList.toggle('open');
}

function toggleAll() {
  const all = document.querySelectorAll('.institution');
  const anyOpen = document.querySelector('.institution.open');
  all.forEach(el => {
    if (anyOpen) el.classList.remove('open');
    else el.classList.add('open');
  });
  render();
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.querySelector('[data-filter="all"]').classList.add('active');
render();
</script>
